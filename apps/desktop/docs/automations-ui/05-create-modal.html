<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>05 — Create modal</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <style>
    html, body { height: 100vh; overflow: hidden; }
    .shell-frame { position: absolute; inset: 0; border: 0; width: 100%; height: 100%; z-index: 0; }
    /* Dim background under modal */
    .dim-overlay {
      position: absolute;
      top: 44px; left: 240px; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }
    .modal {
      position: absolute;
      top: 88px;
      left: 280px;
      right: 40px;
      bottom: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      z-index: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 18px 24px 0;
    }
    .info-icon {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted-foreground);
      border: 1px solid var(--border);
      font-size: 13px;
    }
    .use-template-btn {
      background: transparent;
      color: var(--foreground);
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-body {
      flex: 1;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    .title-input {
      font-size: 22px;
      font-weight: 500;
      color: var(--muted-foreground);
    }
    .title-input::placeholder { color: var(--muted-foreground); }
    .prompt-textarea {
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted-foreground);
      min-height: 280px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer-spacer { flex: 1; }
    .chip-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted-foreground);
      font-size: 13px;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .chip-ghost:hover {
      background: var(--secondary);
      color: var(--foreground);
    }
    .cancel-btn {
      background: transparent;
      color: var(--muted-foreground);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .cancel-btn:hover { color: var(--foreground); }
    .create-btn {
      background: var(--secondary);
      color: var(--muted-foreground);
      padding: 7px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <iframe class="shell-frame" src="./assets/app-shell.html#nav=automations"></iframe>
  <div class="dim-overlay"></div>

  <div class="modal">
    <div class="modal-header">
      <span class="info-icon">ⓘ</span>
      <button class="use-template-btn">Use template</button>
    </div>

    <div class="modal-body">
      <input class="input title-input" placeholder="Automation title" />
      <textarea class="textarea prompt-textarea" placeholder="Add prompt e.g. look for crashes in $sentry"></textarea>
    </div>

    <div class="modal-footer">
      <span class="chip-ghost">💻 Select device <span class="caret">▾</span></span>
      <span class="chip-ghost">🖥 New workspace <span class="caret">▾</span></span>
      <span class="chip-ghost">🤖 Select agent <span class="caret">▾</span></span>
      <span class="chip-ghost">⏱ Daily at 9:00 AM <span class="caret">▾</span></span>
      <span class="chip-ghost">⋯</span>
      <div class="footer-spacer"></div>
      <button class="cancel-btn">Cancel</button>
      <button class="create-btn">Create</button>
    </div>
  </div>
</body>
</html>
