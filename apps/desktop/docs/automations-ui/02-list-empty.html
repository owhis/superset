<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>02 — Automations list (empty)</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <style>
    html, body { height: 100vh; overflow: hidden; }
    .shell-frame { position: absolute; inset: 0; border: 0; width: 100%; height: 100%; z-index: 0; }
    .content-overlay {
      position: absolute;
      top: 44px;
      left: 240px;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 48px 64px;
      background: var(--background);
      z-index: 1;
    }
    .main-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 80px;
    }
    .main-header h1 {
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 6px;
    }
    .main-header .subtitle {
      color: var(--muted-foreground);
      font-size: 13px;
      margin: 0;
    }
    .main-header .subtitle a { color: #6da7f0; text-decoration: none; }
    .new-btn {
      background: #ffffff;
      color: #151110;
      padding: 7px 16px;
      border-radius: 999px;
      font-weight: 500;
      font-size: 13px;
      white-space: nowrap;
    }

    .empty-card {
      max-width: 540px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 40px;
      text-align: center;
    }
    .empty-card .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      border-radius: 12px;
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .empty-card h3 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 10px;
    }
    .empty-card p {
      color: var(--muted-foreground);
      font-size: 13px;
      line-height: 1.55;
      margin: 0 0 24px;
    }
    .cta-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .cta-row .btn.ghost {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .cta-row .btn.primary {
      padding: 7px 16px;
      border-radius: 999px;
      background: #ffffff;
      color: #151110;
    }
  </style>
</head>
<body>
  <iframe class="shell-frame" src="./assets/app-shell.html#nav=automations"></iframe>
  <div class="content-overlay">
    <div class="main-header">
      <div>
        <h1>Automations</h1>
        <p class="subtitle">Automate work by setting up scheduled runs. <a href="#">Learn more</a></p>
      </div>
      <button class="new-btn">＋ New automation</button>
    </div>

    <div class="empty-card">
      <div class="empty-icon">⏱</div>
      <h3>No automations yet</h3>
      <p>
        Schedule a Claude session to run on your machine — daily standups,
        weekly release notes, nightly test audits.
      </p>
      <div class="cta-row">
        <button class="btn ghost">Browse templates</button>
        <button class="btn primary">＋ New automation</button>
      </div>
    </div>
  </div>
</body>
</html>
