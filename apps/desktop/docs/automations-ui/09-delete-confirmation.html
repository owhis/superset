<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>09 — Delete confirmation</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <style>
    html, body { height: 100vh; overflow: hidden; }
    .shell-frame { position: absolute; inset: 0; border: 0; width: 100%; height: 100%; z-index: 0; }

    /* Dimmed detail page behind */
    .dim-overlay {
      position: absolute;
      top: 44px; left: 240px; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    .dialog {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      padding: 24px;
      z-index: 2;
    }
    .dialog h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    .dialog p {
      font-size: 13px;
      color: var(--muted-foreground);
      line-height: 1.6;
      margin: 0 0 20px;
    }
    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .btn-cancel {
      background: transparent;
      color: var(--foreground);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .btn-cancel:hover { background: var(--secondary); }
    .btn-destroy {
      background: var(--destructive);
      color: #fff;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-destroy:hover { background: #d25555; }
  </style>
</head>
<body>
  <iframe class="shell-frame" src="./assets/app-shell.html#nav=automations"></iframe>
  <div class="dim-overlay"></div>

  <div class="dialog">
    <h2>Delete "Weekly release notes"?</h2>
    <p>
      This removes the automation and its run history.
      Chat sessions from previous runs are preserved and remain accessible from each run's workspace.
    </p>
    <div class="dialog-actions">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-destroy">Delete</button>
    </div>
  </div>
</body>
</html>
