<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>01 — Automations list (populated)</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <style>
    .page {
      display: grid;
      grid-template-rows: 44px 1fr;
      height: 100vh;
    }
    .shell-frame {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .body {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: 100%;
      overflow: hidden;
    }
    .shell {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .main {
      overflow-y: auto;
      padding: 48px 64px;
      position: relative;
    }
    .main-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .main-header h1 {
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 6px;
    }
    .main-header .subtitle {
      color: var(--muted-foreground);
      font-size: 13px;
      margin: 0;
    }
    .main-header .subtitle a { color: #6da7f0; text-decoration: none; }
    .new-btn {
      background: #ffffff;
      color: #151110;
      padding: 7px 16px;
      border-radius: 999px;
      font-weight: 500;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .section-title {
      font-size: 14px;
      font-weight: 500;
      margin: 0 0 14px;
    }
    .list {
      border-top: 1px solid var(--border);
    }
    .row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr auto;
      align-items: center;
      padding: 14px 4px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      gap: 16px;
    }
    .row:hover { background: rgba(255, 255, 255, 0.02); }
    .row .name { font-weight: 500; font-size: 14px; }
    .row .folder { color: var(--muted-foreground); font-size: 13px; }
    .row .schedule { color: var(--muted-foreground); font-size: 13px; text-align: right; }
    .row.paused .name { color: var(--muted-foreground); }
    .row.paused .schedule::after {
      content: "  (paused)";
      color: var(--muted-foreground);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="page">
    <iframe class="shell-frame" src="./assets/app-shell.html#nav=automations" style="grid-row: 1 / span 2;"></iframe>
    <style>
      .page { display: block; position: relative; height: 100vh; overflow: hidden; }
      .shell-frame { position: absolute; inset: 0; z-index: 0; }
      .content-overlay {
        position: absolute;
        top: 44px;
        left: 240px;
        right: 0;
        bottom: 0;
        overflow-y: auto;
        padding: 48px 64px;
        background: var(--background);
        z-index: 1;
      }
    </style>
    <div class="content-overlay">
      <div class="main-header">
        <div>
          <h1>Automations</h1>
          <p class="subtitle">Automate work by setting up scheduled runs. <a href="#">Learn more</a></p>
        </div>
        <button class="new-btn">＋ New automation</button>
      </div>

      <h2 class="section-title">Current</h2>
      <div class="list">
        <div class="row">
          <span><span class="dot filled active"></span></span>
          <span class="name">Weekly release notes</span>
          <span class="folder">monorepo</span>
          <span class="schedule">Fridays at 9:00 AM</span>
        </div>
        <div class="row">
          <span><span class="dot filled active"></span></span>
          <span class="name">Daily standup draft</span>
          <span class="folder">monorepo</span>
          <span class="schedule">Weekdays at 9:00 AM</span>
        </div>
        <div class="row">
          <span><span class="dot filled active"></span></span>
          <span class="name">CI triage — flaky tests</span>
          <span class="folder">monorepo</span>
          <span class="schedule">Every 4 hours</span>
        </div>
        <div class="row paused">
          <span><span class="dot hollow"></span></span>
          <span class="name">Nightly test audit</span>
          <span class="folder">monorepo</span>
          <span class="schedule">Every day at 2:00 AM</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
